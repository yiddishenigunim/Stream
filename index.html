    <title>חסידישע ניגונים סטרימינג</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23d4af37' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><path d='M9 18V5l12-2v13'></path><circle cx='6' cy='18' r='3'></circle><circle cx='18' cy='16' r='3'></circle></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;800;900&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsmediatags/3.9.5/jsmediatags.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --gold-light: #fbe6ad;
            --gold: #d4af37;
            --gold-dark: #aa841c;
            --navy-dark: #070e1b;
            --navy: #0e1d35;
            --navy-light: #182e50;
            --cream: #faf6eb;
            --glass-bg: rgba(14, 29, 53, 0.45);
            --glass-border: rgba(255, 255, 255, 0.08);
            --gold-glow: 0 0 25px rgba(212, 175, 55, 0.25);
            --theme-highlight: var(--gold);
        }
        
        body {
            font-family: 'Heebo', sans-serif;
            background: linear-gradient(135deg, #050c18 0%, #0c182b 50%, #152744 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0;
            margin: 0;
            overflow-x: hidden;
            position: relative;
        }
        
        /* Glowing background orbs */
        .bg-orbs {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }
        
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.12;
            mix-blend-mode: screen;
            animation: floatOrb 25s infinite alternate ease-in-out;
            transition: background-color 1.8s cubic-bezier(0.25, 1, 0.5, 1),
                        opacity 1.8s cubic-bezier(0.25, 1, 0.5, 1);
        }
        
        .orb-1 {
            width: 450px;
            height: 450px;
            background-color: var(--gold);
            top: -10%;
            left: -10%;
            animation-duration: 20s;
        }
        
        .orb-2 {
            width: 550px;
            height: 550px;
            background-color: #8b3a42;
            bottom: -15%;
            right: -10%;
            animation-duration: 28s;
            animation-delay: -5s;
        }
        
        .orb-3 {
            width: 350px;
            height: 350px;
            background-color: #4a3a6a;
            top: 45%;
            left: 50%;
            animation-duration: 25s;
            animation-delay: -10s;
        }

        /* Dynamic orb colors and opacities based on active theme */
        body.theme-marshn .orb { opacity: 0.16; }
        body.theme-marshn .orb-1 { background-color: #eb6e3c; }
        body.theme-marshn .orb-2 { background-color: #873214; }
        body.theme-marshn .orb-3 { background-color: #aa841c; }

        body.theme-lebedik .orb { opacity: 0.18; }
        body.theme-lebedik .orb-1 { background-color: #a0234b; }
        body.theme-lebedik .orb-2 { background-color: #550f28; }
        body.theme-lebedik .orb-3 { background-color: #8b3a42; }

        body.theme-shteyt .orb { opacity: 0.18; }
        body.theme-shteyt .orb-1 { background-color: #5f32af; }
        body.theme-shteyt .orb-2 { background-color: #28125a; }
        body.theme-shteyt .orb-3 { background-color: #4b208c; }

        body.theme-music .orb { opacity: 0.18; }
        body.theme-music .orb-1 { background-color: #28825f; }
        body.theme-music .orb-2 { background-color: #0f3c28; }
        body.theme-music .orb-3 { background-color: #40a078; }

        body.theme-vocali .orb { opacity: 0.18; }
        body.theme-vocali .orb-1 { background-color: #3791af; }
        body.theme-vocali .orb-2 { background-color: #14465a; }
        body.theme-vocali .orb-3 { background-color: #4ba5c5; }

        body.theme-moadim .orb { opacity: 0.15; }
        body.theme-moadim .orb-1 { background-color: var(--gold); }
        body.theme-moadim .orb-2 { background-color: var(--gold-dark); }
        body.theme-moadim .orb-3 { background-color: var(--gold-light); }
        
        @keyframes floatOrb {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(80px, -60px) scale(1.15); }
            100% { transform: translate(-50px, 70px) scale(0.9); }
        }
        
        /* Animated background pattern */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 50% 0%, rgba(212, 175, 55, 0.05) 0%, transparent 60%),
                radial-gradient(circle at 50% 100%, rgba(114, 47, 55, 0.05) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }
        
        .container {
            background: transparent;
            border-radius: 0;
            box-shadow: none;
            max-width: 100%;
            width: 100%;
            overflow: hidden;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
            z-index: 1;
        }
        
        /* Decorative stars background */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            overflow: hidden;
            z-index: 0;
        }
        
        .bg-note {
            position: absolute;
            color: var(--gold-light);
            opacity: 0.22;
            animation: twinkle 3.5s infinite ease-in-out;
            pointer-events: none;
        }
        
        @keyframes twinkle {
            0%, 100% { opacity: 0.15; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.4); }
        }
        
        .header {
            padding: 45px 20px 30px;
            text-align: center;
            position: relative;
            overflow: hidden;
            z-index: 2;
        }
        
        .header h1 {
            font-size: 3.2em;
            margin-bottom: 8px;
            font-weight: 700;
            background: linear-gradient(135deg, #ffffff 10%, var(--gold-light) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 3px 6px rgba(0,0,0,0.4));
            letter-spacing: 1px;
            font-family: 'Heebo', sans-serif;
        }
        
        .header .subtitle {
            font-size: 1.1em;
            color: var(--cream);
            opacity: 0.75;
            margin-top: 6px;
            font-weight: 400;
            letter-spacing: 0.5px;
        }
        
        .header::after {
            content: '';
            display: block;
            margin: 20px auto 0;
            width: 150px;
            height: 2px;
            background: linear-gradient(90deg, 
                transparent, 
                var(--gold) 20%, 
                var(--gold) 80%, 
                transparent);
            opacity: 0.5;
        }
        
        .main-section {
            padding: 20px 30px 15px;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            max-width: 850px;
            margin: 0 auto;
            width: 100%;
            z-index: 2;
        }
        
        .category-buttons {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 16px;
            width: 100%;
            margin-bottom: 30px;
        }
        
        .category-btn {
            aspect-ratio: 1 / 1.05;
            border-radius: 20px;
            border: 1px solid var(--glass-border);
            cursor: pointer;
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            font-size: 1.05em;
            font-weight: 700;
            font-family: inherit;
            position: relative;
            overflow: hidden;
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            color: var(--cream);
            box-shadow: 
                0 8px 32px rgba(0, 0, 0, 0.25),
                inset 0 1px 0 rgba(255, 255, 255, 0.05);
        }
        
        .category-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at center, rgba(255, 255, 255, 0.08) 0%, transparent 70%);
            opacity: 0;
            transition: opacity 0.4s;
        }
        
        .category-btn:hover::before {
            opacity: 1;
        }
        
        .category-btn:hover {
            transform: translateY(-8px) scale(1.03);
            border-color: rgba(212, 175, 55, 0.45);
            box-shadow: 
                0 15px 35px rgba(0, 0, 0, 0.35),
                0 0 25px rgba(212, 175, 55, 0.15);
        }
        
        .category-btn:active {
            transform: translateY(-2px) scale(0.98);
        }
        
        .category-btn.active {
            border-color: var(--gold);
            background: linear-gradient(135deg, rgba(212, 175, 55, 0.15), rgba(212, 175, 55, 0.02));
            box-shadow: 
                0 8px 32px rgba(0, 0, 0, 0.25),
                0 0 30px rgba(212, 175, 55, 0.35);
        }
        
        /* Elegant translucent card styles based on genre */
        .btn-marshn { background: linear-gradient(135deg, rgba(235, 110, 60, 0.35), rgba(135, 50, 20, 0.55)); }
        .btn-lebedik { background: linear-gradient(135deg, rgba(160, 35, 75, 0.35), rgba(85, 15, 40, 0.55)); }
        .btn-shteyt { background: linear-gradient(135deg, rgba(95, 50, 175, 0.35), rgba(40, 18, 90, 0.55)); }
        .btn-music { background: linear-gradient(135deg, rgba(40, 130, 95, 0.35), rgba(15, 60, 40, 0.55)); }
        .btn-vocali { background: linear-gradient(135deg, rgba(55, 145, 175, 0.35), rgba(20, 70, 90, 0.55)); }
        
        .section-title {
            color: var(--gold-light);
            font-size: 1.4em;
            margin-bottom: 20px;
            text-align: center;
            font-weight: 600;
        }
        
        .moadim-section {
            width: 100%;
            margin: 10px 0 15px;
            text-align: center;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 24px;
            padding: 20px 25px;
            border: 1px solid rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
        }
        
        .moadim-title {
            color: var(--gold-light);
            font-size: 1.25em;
            margin-bottom: 15px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }
        
        .moadim-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
        }
        
        .moadim-row-1 {
            margin-bottom: 12px;
        }
        
        .moadim-btn {
            padding: 9px 20px;
            border-radius: 30px;
            border: 1px solid var(--glass-border);
            background: var(--glass-bg);
            cursor: pointer;
            font-size: 0.95em;
            font-weight: 500;
            font-family: inherit;
            color: var(--cream);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }
        
        .moadim-btn:hover {
            border-color: rgba(212, 175, 55, 0.35);
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
            background: rgba(255, 255, 255, 0.08);
        }
        
        .moadim-btn.active {
            border-color: var(--gold);
            background: rgba(212, 175, 55, 0.15);
            box-shadow: 
                0 4px 15px rgba(0, 0, 0, 0.15), 
                0 0 20px rgba(212, 175, 55, 0.25);
        }
        
        .play-icon {
            display: flex;
            align-items: center;
            justify-content: center;
            filter: drop-shadow(0 2px 6px rgba(0,0,0,0.45));
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), color 0.3s;
            color: var(--gold-light);
        }
        
        .play-icon svg {
            width: 38px;
            height: 38px;
            stroke: currentColor;
            transition: stroke 0.3s, transform 0.3s;
        }
        
        .category-btn:hover .play-icon {
            transform: scale(1.15);
            color: var(--gold);
        }
        
        .category-btn.active .play-icon {
            color: var(--gold);
            filter: drop-shadow(0 0 10px rgba(212, 175, 55, 0.6));
        }
        
        .category-label {
            letter-spacing: 0.5px;
            font-size: 0.85em;
            font-family: 'Heebo', sans-serif;
            font-weight: 700;
            line-height: 1.3;
            min-height: 2.6em;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        
        /* The Player Card (Centered layout box) */
        .player {
            background: var(--glass-bg);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.04);
            padding: 0 40px;
            border-radius: 28px;
            color: var(--cream);
            width: 100%;
            max-width: 100%;
            margin: 0 auto;
            box-shadow: 0 15px 45px rgba(0,0,0,0.3);
            position: relative;
            overflow: hidden;
            max-height: 0;
            opacity: 0;
            border-width: 0;
            transition: max-height 0.8s cubic-bezier(0.16, 1, 0.3, 1), 
                        opacity 0.6s cubic-bezier(0.16, 1, 0.3, 1), 
                        padding 0.8s cubic-bezier(0.16, 1, 0.3, 1), 
                        margin 0.8s cubic-bezier(0.16, 1, 0.3, 1), 
                        background 0.8s ease, 
                        border-color 0.8s ease, 
                        box-shadow 0.8s ease;
        }
        
        .player.is-active {
            max-height: 600px;
            opacity: 1;
            padding: 30px 40px;
            margin: 20px auto 30px;
            border-width: 1px;
            border-color: rgba(255, 255, 255, 0.08);
            overflow: visible;
        }
        
        .player.is-playing {
            border-color: rgba(212, 175, 55, 0.45);
            box-shadow: 
                0 25px 60px rgba(0,0,0,0.5),
                0 0 40px rgba(212, 175, 55, 0.25);
        }

        /* Shockwave/Pulse Ripple Effect for Player Card */
        @keyframes player-pulse-ring {
            0% {
                transform: scale(1);
                opacity: 0.7;
                box-shadow: 0 0 0px transparent;
            }
            25% {
                box-shadow: 0 0 8px var(--gold-light);
            }
            50% {
                opacity: 0;
                box-shadow: 0 0 0px transparent;
            }
            100% {
                transform: scale(1.08, 1.15);
                opacity: 0;
            }
        }
        
        .player::before,
        .player::after {
            content: '';
            position: absolute;
            left: -1px;
            top: -1px;
            right: -1px;
            bottom: -1px;
            border: 2px solid var(--theme-highlight);
            border-radius: 28px;
            z-index: -1;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
            box-sizing: border-box;
        }
        
        .player.is-playing::before {
            opacity: 1;
            animation: player-pulse-ring 2.5s cubic-bezier(0.215, 0.61, 0.355, 1) infinite;
        }
        
        .player.is-playing::after {
            opacity: 1;
            animation: player-pulse-ring 2.5s cubic-bezier(0.215, 0.61, 0.355, 1) infinite;
            animation-delay: 1.25s;
        }
        
        /* Player Themes */
        .player.theme-marshn {
            background: linear-gradient(135deg, rgba(235, 110, 60, 0.8), rgba(135, 50, 20, 0.95));
            border-color: rgba(235, 110, 60, 0.5);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5), 0 0 30px rgba(235, 110, 60, 0.25);
            --theme-highlight: #eb6e3c;
        }
        .player.theme-lebedik {
            background: linear-gradient(135deg, rgba(160, 35, 75, 0.8), rgba(85, 15, 40, 0.95));
            border-color: rgba(160, 35, 75, 0.5);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5), 0 0 30px rgba(160, 35, 75, 0.25);
            --theme-highlight: #a0234b;
        }
        .player.theme-shteyt {
            background: linear-gradient(135deg, rgba(95, 50, 175, 0.8), rgba(40, 18, 90, 0.95));
            border-color: rgba(95, 50, 175, 0.5);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5), 0 0 30px rgba(95, 50, 175, 0.25);
            --theme-highlight: #5f32af;
        }
        .player.theme-music {
            background: linear-gradient(135deg, rgba(40, 130, 95, 0.8), rgba(15, 60, 40, 0.95));
            border-color: rgba(40, 130, 95, 0.5);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5), 0 0 30px rgba(40, 130, 95, 0.25);
            --theme-highlight: #28825f;
        }
        .player.theme-vocali {
            background: linear-gradient(135deg, rgba(55, 145, 175, 0.8), rgba(20, 70, 90, 0.95));
            border-color: rgba(55, 145, 175, 0.5);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5), 0 0 30px rgba(55, 145, 175, 0.25);
            --theme-highlight: #3791af;
        }
        .player.theme-moadim {
            background: linear-gradient(135deg, rgba(212, 175, 55, 0.15), rgba(14, 29, 53, 0.95));
            border-color: rgba(212, 175, 55, 0.4);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5), 0 0 35px rgba(212, 175, 55, 0.25);
            --theme-highlight: var(--gold);
        }
        
        /* Theme background overlay */
        .theme-bg-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(255, 255, 255, 0);
            pointer-events: none;
            z-index: 0;
            transition: background-color 1.2s cubic-bezier(0.25, 1, 0.5, 1);
        }
        
        body.theme-marshn .theme-bg-overlay {
            background-color: rgba(235, 110, 60, 0.14);
        }
        body.theme-lebedik .theme-bg-overlay {
            background-color: rgba(160, 35, 75, 0.18);
        }
        body.theme-shteyt .theme-bg-overlay {
            background-color: rgba(95, 50, 175, 0.16);
        }
        body.theme-music .theme-bg-overlay {
            background-color: rgba(40, 130, 95, 0.16);
        }
        body.theme-vocali .theme-bg-overlay {
            background-color: rgba(55, 145, 175, 0.16);
        }
        body.theme-moadim .theme-bg-overlay {
            background-color: rgba(212, 175, 55, 0.10);
        }

        /* Player header style */
        .player-header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            padding-bottom: 15px;
        }
        
        .player-category-icon {
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .player-category-icon svg {
            width: 32px;
            height: 32px;

            font-weight: 800;
            color: var(--gold-light);
            letter-spacing: 0.5px;
            font-family: 'Heebo', sans-serif;
        }
        

        

        
        /* Player Notes stage */
        .player-notes {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
            border-radius: 28px;
            opacity: 0;
            transition: opacity 1s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .player.is-playing .player-notes {
            opacity: 1;
        }

        .player-notes .note-wrapper {
            position: absolute;
            left: 50%;
            top: 50%;
            transform-style: preserve-3d;
            animation: songsNoteFlight linear infinite;
        }

        .player-notes .musical-note {
            color: rgba(212, 175, 55, 0.38);
            text-shadow: 0 0 15px rgba(212, 175, 55, 0.35);
            font-size: inherit;
            display: block;
            transform-style: preserve-3d;
        }

        .player-notes .musical-note.wander-1 {
            animation: wander1 ease-in-out infinite alternate;
        }

        .player-notes .musical-note.wander-2 {
            animation: wander2 ease-in-out infinite alternate;
        }

        .player-notes .musical-note.wander-3 {
            animation: wander3 ease-in-out infinite alternate;
        }

        @keyframes songsNoteFlight {
            0% {
                transform: translate(-50%, -50%) scale(0.2);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            50% {
                opacity: 0.8;
            }
            85% {
                opacity: 0.4;
            }
            100% {
                transform: translate(var(--end-x), var(--end-y)) scale(1.3);
                opacity: 0;
            }
        }

        @keyframes wander1 {
            0% {
                transform: translate3d(0, 0, 0) rotateZ(var(--rot)) rotateX(0deg) rotateY(0deg);
            }
            33% {
                transform: translate3d(60px, -90px, 30px) rotateZ(calc(var(--rot) + 120deg)) rotateX(40deg) rotateY(30deg);
            }
            66% {
                transform: translate3d(-40px, 70px, -40px) rotateZ(calc(var(--rot) + 240deg)) rotateX(-30deg) rotateY(-40deg);
            }
            100% {
                transform: translate3d(0, 0, 0) rotateZ(calc(var(--rot) + 360deg)) rotateX(0deg) rotateY(0deg);
            }
        }

        @keyframes wander2 {
            0% {
                transform: translate3d(0, 0, 0) rotateZ(var(--rot)) rotateX(0deg) rotateY(0deg);
            }
            50% {
                transform: translate3d(-90px, 0, 60px) rotateZ(calc(var(--rot) - 180deg)) rotateX(-45deg) rotateY(45deg);
            }
            100% {
                transform: translate3d(90px, -50px, -80px) rotateZ(calc(var(--rot) - 360deg)) rotateX(0deg) rotateY(0deg);
            }
        }

        @keyframes wander3 {
            0% {
                transform: translate3d(0, 0, 0) rotateZ(var(--rot)) rotateX(0deg) rotateY(0deg);
            }
            25% {
                transform: translate3d(70px, 70px, 50px) rotateZ(calc(var(--rot) + 90deg)) rotateX(50deg) rotateY(-30deg);
            }
            75% {
                transform: translate3d(-70px, -70px, -50px) rotateZ(calc(var(--rot) + 270deg)) rotateX(-50deg) rotateY(30deg);
            }
            100% {
                transform: translate3d(0, 0, 0) rotateZ(calc(var(--rot) + 360deg)) rotateX(0deg) rotateY(0deg);
            }
        }
        
        .now-playing {

        /* Animated play/pause icons inside play button */
        .player-play-icon,

            }

    <!-- ───────────────────────────────────────────────────────────────
         Stream analytics wrapper. Every user interaction routes through
         Analytics.* so event names + param shapes live in one place. The
         gtag() loader is in <head>; events flow to the configured GA4
         property automatically. Every call is a no-op if gtag is blocked
         (ad-blocker / offline / consent denied).
         ─────────────────────────────────────────────────────────────── -->
    <script>
    const Analytics = {
        _send(name, params) {
            if (typeof gtag !== 'function') return;
            try { gtag('event', name, params || {}); } catch (_) {}
        },

        // ── Category / station selection ───────────────────────────────
        categorySelected(category, type) {
            this._send('category_selected', {
                category: category || '',
                category_type: type || ''      // 'genre' or 'moadim'
            });
        },
        categoryLoaded(opts) {
            this._send('category_loaded', {
                category: opts.category || '',
                track_count: opts.count || 0,
                from_cache: !!opts.fromCache
            });
        },
        categoryLoadFailed(opts) {
            this._send('category_load_failed', {
                category: opts.category || '',
                error_message: (opts.errorMessage || 'unknown')
            });
        },

        // ── Playback ───────────────────────────────────────────────────
        songPlay(opts) {
            this._send('song_play', {
                category: opts.category || '',
                track_name: opts.trackName || '',
                track_index: opts.trackIndex,
                playlist_size: opts.playlistSize,
                source: opts.source || 'unknown'   // category / next / prev / auto
            });
        },
        songCompleted(opts) {
            this._send('song_play_completed', {
                category: opts.category || '',
                track_name: opts.trackName || '',
                duration_seconds: Math.round(opts.durationSeconds || 0)
            });
        },
        // 25 / 50 / 75 % milestones — at most once per track per playback.
        songMilestone(opts) {
            this._send('song_play_milestone', {
                category: opts.category || '',
                track_name: opts.trackName || '',
                milestone: opts.milestone
            });
        },
        songSkip(opts) {
            this._send('song_skip', {
                category: opts.category || '',
                track_name: opts.trackName || '',
                direction: opts.direction || 'next',     // next / prev
                percent_played: opts.percentPlayed,
                source: opts.source || 'manual'          // manual / keyboard
            });
        },
        playPaused(opts) {
            this._send('play_paused', {
                category: opts.category || '',
                track_name: opts.trackName || '',
                played_seconds: Math.round(opts.playedSeconds || 0)
            });
        },
        playResumed(opts) {
            this._send('play_resumed', {
                category: opts.category || '',
                track_name: opts.trackName || ''
            });
        },
        seekAction(opts) {
            this._send('seek_action', {
                category: opts.category || '',
                from_seconds: Math.round(opts.fromSeconds || 0),
                to_seconds: Math.round(opts.toSeconds || 0),
                duration_seconds: Math.round(opts.durationSeconds || 0)
            });
        },
        volumeChanged(opts) {
            this._send('volume_changed', {
                to_volume: Math.round((opts.toVolume || 0) * 100)
            });
        },
        keyboardShortcut(key) {
            this._send('keyboard_shortcut', { key: key || '' });
        },

        // ── Errors / reliability ───────────────────────────────────────
        playbackError(opts) {
            this._send('playback_error', {
                category: opts.category || '',
                track_name: opts.trackName || '',
                retry_count: opts.retryCount || 0
            });
        },
        playbackGaveUp(opts) {
            this._send('playback_gave_up', {
                category: opts.category || '',
                track_name: opts.trackName || ''
            });
        },
        playbackStalled(opts) {
            this._send('playback_stalled', {
                category: opts.category || '',
                track_name: opts.trackName || ''
            });
        },
        apiError(opts) {
            this._send('api_error', {
                endpoint: opts.endpoint || '',
                error_message: (opts.errorMessage || '').slice(0, 150)
            });
        },
        jsError(opts) {
            this._send('exception', {
                description: (opts.description || '').slice(0, 150),
                source: opts.source || '',
                line: opts.line || 0,
                fatal: !!opts.fatal
            });
        },

        // ── Outbound / performance ─────────────────────────────────────
        outboundClick(opts) {
            this._send('click', {
                link_url: opts.url || '',
                link_domain: opts.domain || '',
                outbound: true
            });
        },
        webVital(name, value, rating) {
            this._send('web_vitals', {
                metric_name: name,
                metric_value: Math.round(name === 'CLS' ? value * 1000 : value),
                metric_rating: rating || ''
            });
        },

        // ── Session quality ────────────────────────────────────────────
        firstPlay() { this._send('first_play', {}); },
        sessionEngaged() { this._send('session_engaged', {}); },   // 30s engaged
        sessionDeep() { this._send('session_deep', {}); }          // 5+ plays
    };
    window.Analytics = Analytics;

    // Session engagement: fire once at 30s of focused/visible time.
    (function initSessionTracking() {
        let engagedSeconds = 0, engagedFired = false;
        setInterval(() => {
            if (document.visibilityState === 'visible' && document.hasFocus()) {
                engagedSeconds++;
                if (!engagedFired && engagedSeconds >= 30) {
                    engagedFired = true;
                    Analytics.sessionEngaged();
                }
            }
        }, 1000);
    })();

    // Outbound link tracking for the footer links (project + email).
    window.addEventListener('DOMContentLoaded', () => {
        document.querySelectorAll('.site-footer a[href]').forEach(a => {
            a.addEventListener('click', () => {
                try {
                    let domain = '';
                    try { domain = new URL(a.href, location.href).hostname; } catch (_) {}
                    Analytics.outboundClick({ url: a.getAttribute('href') || '', domain });
                } catch (_) {}
            });
        });
    });
    </script>

    <script data-cfasync="false" src="/cdn-cgi/scripts/5c5dd728/cloudflare-static/email-decode.min.js"></script><script>
        // Create background twinkling notes
        function createBackgroundNotes() {
            const starsContainer = document.getElementById('stars');
            const numberOfStars = 55;
            const notes = ['♪', '♫', '♩', '♬', '♭', '♮', '♯', '𝄞', '𝄢'];
            
            for (let i = 0; i < numberOfStars; i++) {

                note.className = 'bg-note';
                note.textContent = notes[Math.floor(Math.random() * notes.length)];

                note.style.animationDelay = Math.random() * 3 + 's';
                note.style.animationDuration = (2 + Math.random() * 2) + 's';
                starsContainer.appendChild(note);
            }
        }
        createBackgroundNotes();
        
        const R2_BASE_URL = 'https://r2.oitzerhanigunim.org';
        const API_URL = 'https://stream-api.oitzerhanigunim.org';
        
        const FOLDERS = {
            marshn: 'שיינע מארשן',
            lebedik: 'לעבעדיג',
            shteyt: 'שטייטע',
            music: 'בלויז מוזיק',
            vocali: 'מועדים וזמנים/ספירה/וואכן',
            shabbos: 'מועדים וזמנים/ניגוני שבק',
            motzeishabbos: 'מועדים וזמנים/מוצאי שב_ק',
            roshchodesh: 'מועדים וזמנים/ראש חודש',
            yomimnoroim: 'מועדים וזמנים/ימים נוראים',
            sukkos: 'מועדים וזמנים/סוכות',
            chanukah: 'מועדים וזמנים/חנוכה',
            purim: 'מועדים וזמנים/פורים',
            pesach: 'מועדים וזמנים/פסח',
            lagbomer: 'מועדים וזמנים/ל_ג בעומר',
            shavuos: 'מועדים וזמנים/שבועות'
        };
        
        let _lastVocaliPath = FOLDERS.vocali;

        function getSefiraFolder() {
            const now = new Date();
            const day = now.getDay(); // 0=Sun, 4=Thu, 5=Fri, 6=Sat
            const hour = now.getHours();
            // Thursday 6pm to Saturday 6pm = שבת
            if ((day === 4 && hour >= 18) || day === 5 || (day === 6 && hour < 18)) {
                return 'מועדים וזמנים/ספירה/שבת';
            }
            return 'מועדים וזמנים/ספירה/וואכן';
        }

        let allSongs = {
            marshn: [],
            lebedik: [],
            shteyt: [],
            music: [],
            vocali: [],
            shabbos: [],
            motzeishabbos: [],
            roshchodesh: [],
            yomimnoroim: [],
            sukkos: [],
            chanukah: [],
            purim: [],
            pesach: [],
            lagbomer: [],
            shavuos: []
        };
        
        let currentCategory = '';
        let currentPlaylist = [];
        let currentIndex = 0;
        let isPlaying = false;
        let currentTrackName = '';

        // ── Analytics state ──
        let _playSource = 'category';   // how the current track started
        let _playCount = 0;             // plays this session (for first_play / deep)
        let _milestonesFired = {};      // per-track 25/50/75 dedupe
        let _skipLogged = false;        // avoid double-logging one skip
        
        const audioPlayer = document.getElementById('audio-player');
        const playBtn = document.getElementById('play-btn');
        const nowPlayingTitle = document.getElementById('now-playing-title');
        const playerDiv = document.getElementById('player');
        
        // Load all songs on startup - OPTIMIZED: only load the starting category
        window.onload = async () => {
            try {
                // Only load the starting category
                await loadFolder('marshn');
            } catch (error) {
                console.error('Error loading initial folder:', error);
            }
        };
        
        async function loadFolder(category) {
            // For vocali, dynamically determine folder based on day/time
            if (category === 'vocali') {
                const newPath = getSefiraFolder();
                if (_lastVocaliPath !== newPath) {
                    allSongs['vocali'] = [];
                    _lastVocaliPath = newPath;
                }
                FOLDERS['vocali'] = newPath;
            }

            // Check if already loaded
            if (allSongs[category] && allSongs[category].length > 0) {
                return; // Already loaded, skip
            }

            // Check localStorage cache first
            const cacheKey = 'nigunim_r2_' + category + (category === 'vocali' ? '_' + FOLDERS['vocali'] : '');
            const cached = localStorage.getItem(cacheKey);
            if (cached) {
                const cacheData = JSON.parse(cached);
                // Cache valid for 1 hour
                if (cacheData.timestamp > Date.now() - 3600000) {
                    allSongs[category] = cacheData.files;
                    Analytics.categoryLoaded({ category, count: cacheData.files.length, fromCache: true });
                    return;
                }
            }

            const folderPath = FOLDERS[category];
            
            try {
                const response = await fetch(`${API_URL}/?folder=${encodeURIComponent(folderPath)}`);
                
                if (!response.ok) {
                    throw new Error('Server error');
                }
                
                const data = await response.json();
                
                if (data.error) {
                    throw new Error(data.error);
                }
                
                const songs = data.files.map(file => ({
                    name: file.name,
                    url: `${R2_BASE_URL}/${encodeURIComponent(file.key).replace(/%2F/g, '/')}`
                }));
                
                allSongs[category] = songs;
                Analytics.categoryLoaded({ category, count: songs.length, fromCache: false });

                // Save to localStorage cache
                localStorage.setItem(cacheKey, JSON.stringify({
                    timestamp: Date.now(),
                    files: songs
                }));

            } catch (error) {
                Analytics.categoryLoadFailed({ category, errorMessage: error && error.message });
                Analytics.apiError({ endpoint: 'stream-api/folder', errorMessage: (error && error.message) || 'fetch failed' });
                if (error.message === 'Failed to fetch') {
                    showErrorMessage();
                }
                throw error;
            }
        }
        
        function showErrorMessage() {
            const existingError = document.getElementById('error-overlay');
            if (existingError) return; // Don't show multiple times
            
            const overlay = document.createElement('div');
            overlay.id = 'error-overlay';

                            <line x1="12" y1="17" x2="12.01" y2="17"></line>

                    <p class="error-small">ביטע אנטשולדיגן</p>
                    <h2>עפעס איז געגאנגען נישט גוט דא...</h2>
                    <p>ביטע פרובירט נאכאמאל אין א פאר מינוט.</p>
                    <p class="error-small">אויב עס ארבעט נאך אלץ נישט, ביטע טשעקט מיט אייער פילטער.</p>
                    <button onclick="location.reload()">פרובירט נאכאמאל</button>
                </div>
            `;
            document.body.appendChild(overlay);
        }
        
        async function startPlaying(category) {
            const _catType = ['marshn', 'lebedik', 'shteyt', 'music', 'vocali'].includes(category) ? 'genre' : 'moadim';
            Analytics.categorySelected(category, _catType);
            _playSource = 'category';

            // For vocali, re-check folder path each time (time-dependent)
            if (category === 'vocali') {
                const newPath = getSefiraFolder();
                if (_lastVocaliPath !== newPath) {
                    allSongs['vocali'] = [];
                    _lastVocaliPath = newPath;
                    FOLDERS['vocali'] = newPath;
                }
            }

            // Update active button styling immediately to trigger transitions/hiding
            document.querySelectorAll('.category-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.moadim-btn').forEach(btn => btn.classList.remove('active'));
            
            const mainBtn = document.getElementById('btn-' + category);
            if (mainBtn) {
                mainBtn.classList.add('active');
            }

            // Expand player and set layout classes
            document.body.classList.add('has-active-player');
            playerDiv.classList.add('is-active');

            // Apply theme styling to player and body background
            playerDiv.className = 'player is-active'; // reset themes
            document.body.classList.remove('theme-marshn', 'theme-lebedik', 'theme-shteyt', 'theme-music', 'theme-vocali', 'theme-moadim');
            
            const isCategory = ['marshn', 'lebedik', 'shteyt', 'music', 'vocali'].includes(category);
            if (isCategory) {
                playerDiv.classList.add('theme-' + category);
                document.body.classList.add('theme-' + category);
            } else {
                playerDiv.classList.add('theme-moadim');
                document.body.classList.add('theme-moadim');
            }

            // Update player header title
            if (mainBtn) {
                const titleSpan = document.getElementById('player-category-title');
                
                const label = mainBtn.querySelector('.category-label')?.innerHTML || mainBtn.textContent;
                titleSpan.textContent = label.replace(/<br\s*\/?>/gi, ' ');
            }

            // Show loading if not loaded yet
            if (!allSongs[category] || allSongs[category].length === 0) {
                nowPlayingTitle.textContent = 'לאודט...';
                try {
                    await loadFolder(category);
                } catch (error) {
                    nowPlayingTitle.textContent = 'פרובירט שפעטער...';
                    return;
                }
            }
            
            currentCategory = category;
            currentPlaylist = [...allSongs[category]];
            
            // Shuffle the playlist
            shuffleArray(currentPlaylist);
            
            currentIndex = 0;
            
            playCurrentTrack();
        }
        
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }
        
        function togglePlay() {
            if (audioPlayer.paused) {
                Analytics.playResumed({ category: currentCategory, trackName: currentTrackName });
                audioPlayer.play().catch(() => {});
            } else {
                Analytics.playPaused({
                    category: currentCategory,
                    trackName: currentTrackName,
                    playedSeconds: audioPlayer.currentTime
                });
                audioPlayer.pause();
            }
        }
        
        // Function to fix Hebrew encoding
        function fixHebrewEncoding(text) {
            if (!text) return text;
            
            // Check if text looks like garbled Hebrew (contains chars like á, ø, å, etc.)
            if (/[àáâãäåæçèéêëìíîïðñòóôõö÷øùúûüýþÿ]/.test(text)) {
                try {
                    // Try to decode from Windows-1255 (Hebrew)
                    const win1255ToUtf8 = {
                        'à': 'א', 'á': 'ב', 'â': 'ג', 'ã': 'ד', 'ä': 'ה', 'å': 'ו', 'æ': 'ז', 'ç': 'ח',
                        'è': 'ט', 'é': 'י', 'ê': 'ך', 'ë': 'כ', 'ì': 'ל', 'í': 'ם', 'î': 'מ', 'ï': 'ן',
                        'ð': 'נ', 'ñ': 'ס', 'ò': 'ע', 'ó': 'ף', 'ô': 'פ', 'õ': 'ץ', 'ö': 'צ', '÷': 'ק',
                        'ø': 'ר', 'ù': 'ש', 'ú': 'ת', 'û': 'ו', 'ü': 'ü', 'ý': 'ý', 'þ': 'þ', 'ÿ': 'ÿ'
                    };
                    
                    let fixed = '';
                    for (let char of text) {
                        fixed += win1255ToUtf8[char] || char;
                    }
                    return fixed;
                } catch (e) {
                    return text;
                }
            }
            return text;
        }
        
        // Track ID for current playing track to avoid race conditions
        let currentTrackId = 0;
        
        // Preload audio element for next track
        let preloadAudio = new Audio();
        preloadAudio.preload = 'auto';
        let preloadedIndex = -1;
        
        // Preload the next track in the background
        function preloadNextTrack() {
            if (currentPlaylist.length === 0) return;
            
            const nextIndex = (currentIndex + 1) % currentPlaylist.length;
            
            // Don't re-preload if already preloaded
            if (preloadedIndex === nextIndex) return;
            
            const nextTrack = currentPlaylist[nextIndex];
            if (nextTrack && nextTrack.url) {
                preloadAudio.src = nextTrack.url;
                preloadedIndex = nextIndex;
                console.log('Preloading next track:', nextTrack.name);
            }
        }
        
        function playCurrentTrack() {
            if (currentPlaylist.length === 0) return;
            
            const track = currentPlaylist[currentIndex];
            const streamUrl = track.url;
            
            // Pre-set the track name to the filename in case ID3 is slow or fails
            const defaultName = decodeURIComponent(track.name).replace(/\.[^/.]+$/, "");
            currentTrackName = defaultName;
            
            // Increment track ID to handle race conditions
            currentTrackId++;
            const thisTrackId = currentTrackId;

            // ── Analytics: a new track has started ──
            _milestonesFired = {};
            _skipLogged = false;
            _playCount++;
            if (_playCount === 1) Analytics.firstPlay();
            Analytics.songPlay({
                category: currentCategory,
                trackName: defaultName,
                trackIndex: currentIndex,
                playlistSize: currentPlaylist.length,
                source: _playSource
            });
            if (_playCount === 5) Analytics.sessionDeep();
            
            // Check if this track was preloaded - if so, swap the audio elements
            if (preloadedIndex === currentIndex && preloadAudio.src) {
                // Use the preloaded audio
                audioPlayer.src = preloadAudio.src;
                console.log('Using preloaded track');
            } else {
                audioPlayer.src = streamUrl;
            }
            
            // Reset preloaded index since we're using it now
            preloadedIndex = -1;
            
            // Try to play, but don't force it (browser may block autoplay)
            const playPromise = audioPlayer.play();
            
            if (playPromise !== undefined) {
                playPromise.then(() => {
                    isPlaying = true;
                }).catch(() => {
                    // Autoplay was blocked, user needs to click play
                    isPlaying = false;
                });
            }
            
            // Show loading dots
            nowPlayingTitle.textContent = '• • •';
            
            // Try to read ID3 tags
            jsmediatags.read(streamUrl, {
                onSuccess: function(tag) {
                    // Only update if this is still the current track
                    if (thisTrackId !== currentTrackId) return;
                    
                    let title = tag.tags.title;
                    let artist = tag.tags.artist;
                    
                    // Fix Hebrew encoding if needed
                    title = fixHebrewEncoding(title);
                    artist = fixHebrewEncoding(artist);
                    
                    if (title) {
                        if (artist) {
                            currentTrackName = `${title} - ${artist}`;
                        } else {
                            currentTrackName = title;
                        }
                    } else {
                        // No ID3 title, show filename
                        const displayName = decodeURIComponent(track.name).replace(/\.[^/.]+$/, "");
                        currentTrackName = displayName;
                    }
                    nowPlayingTitle.textContent = currentTrackName;
                },
                onError: function(error) {
                    // Only update if this is still the current track
                    if (thisTrackId !== currentTrackId) return;
                    
                    // Show filename if ID3 reading fails
                    const displayName = decodeURIComponent(track.name).replace(/\.[^/.]+$/, "");
                    currentTrackName = displayName;
                    nowPlayingTitle.textContent = currentTrackName;
                }
            });
        }
        
        // Log how much of the outgoing track was heard before a manual skip.
        // Auto-advance (onended) passes source 'auto' and skips this.
        function logSkip(direction, source) {
            if (_skipLogged) return;
            const dur = audioPlayer.duration;
            const cur = audioPlayer.currentTime;
            if (!dur || isNaN(dur) || dur <= 0) return;
            _skipLogged = true;
            Analytics.songSkip({
                category: currentCategory,
                trackName: currentTrackName,
                direction: direction,
                percentPlayed: Math.round((cur / dur) * 100),
                source: source || 'manual'
            });
        }

        function nextTrack(source) {
            if (currentPlaylist.length === 0) return;

            // A manual advance mid-track counts as a skip.
            if (source !== 'auto') logSkip('next', source || 'manual');

            // If playing vocali and the time-based folder changed, reload
            if (currentCategory === 'vocali') {
                const newPath = getSefiraFolder();
                if (_lastVocaliPath !== newPath) {
                    startPlaying('vocali');
                    return;
                }
            }

            _playSource = (source === 'auto') ? 'auto' : 'next';
            currentIndex = (currentIndex + 1) % currentPlaylist.length;
            playCurrentTrack();
        }

        function previousTrack(source) {
            if (currentPlaylist.length === 0) return;

            logSkip('prev', source || 'manual');

            _playSource = 'prev';
            currentIndex = (currentIndex - 1 + currentPlaylist.length) % currentPlaylist.length;
            playCurrentTrack();
        }
        
        // Auto-play next track when current ends
        audioPlayer.onended = () => {
            Analytics.songCompleted({
                category: currentCategory,
                trackName: currentTrackName,
                durationSeconds: audioPlayer.duration
            });
            nextTrack('auto');
        };
        
        // Retry counter for failed loads
        let retryCount = 0;
        const MAX_RETRIES = 3;
        
        // Global retry limiting - prevent runaway requests
        let totalRetriesThisSession = 0;
        const MAX_TOTAL_RETRIES = 15; // Max retries before stopping completely
        let retryPaused = false;
        let lastRetryTime = 0;
        const MIN_RETRY_INTERVAL = 5000; // At least 5 seconds between retries
        
        // Handle errors - retry a few times before giving up
        audioPlayer.onerror = () => {
            console.log('Error loading track, retry count:', retryCount, 'total:', totalRetriesThisSession);
            
            // Check if we've hit global limits
            if (retryPaused) {
                nowPlayingTitle.textContent = 'ביטע דריקט ▶ צו פרובירן נאכאמאל';
                return;
            }
            
            if (totalRetriesThisSession >= MAX_TOTAL_RETRIES) {
                retryPaused = true;
                nowPlayingTitle.textContent = 'ביטע ריפרעשט די פעיזש';
                console.log('Too many retries, pausing automatic retries');
                Analytics.playbackGaveUp({ category: currentCategory, trackName: currentTrackName });
                return;
            }
            
            // Ensure minimum time between retries
            const now = Date.now();
            if (now - lastRetryTime < MIN_RETRY_INTERVAL) {
                console.log('Retry too soon, waiting...');
                return;
            }
            
            if (retryCount < MAX_RETRIES) {
                retryCount++;
                totalRetriesThisSession++;
                lastRetryTime = now;
                Analytics.playbackError({ category: currentCategory, trackName: currentTrackName, retryCount: retryCount });
                nowPlayingTitle.textContent = `פרובירט נאכאמאל (${retryCount}/${MAX_RETRIES})...`;
                
                // Wait with exponential backoff: 5s, 10s, 15s
                const waitTime = 5000 * retryCount;
                setTimeout(() => {
                    if (currentPlaylist.length > 0 && !retryPaused) {
                        const track = currentPlaylist[currentIndex];
                        audioPlayer.src = track.url;
                        audioPlayer.play().catch(() => {});
                    }
                }, waitTime);
            } else {
                nowPlayingTitle.textContent = 'טרעפט נישט צו לאודן — דריקט ▶';
                Analytics.playbackGaveUp({ category: currentCategory, trackName: currentTrackName });
                retryCount = 0;
            }
        };
        
        // Handle stalled playback - try to recover
        let stallTimer = null;
        let stallRecoveryCount = 0;
        const MAX_STALL_RECOVERIES = 3;
        
        audioPlayer.onwaiting = () => {
            // Show loading indicator only if not paused
            if (!retryPaused) {
                nowPlayingTitle.textContent = 'לאודט...';
            }
        };
        
        audioPlayer.onstalled = () => {
            // Don't try to recover if we've hit limits
            if (retryPaused || stallRecoveryCount >= MAX_STALL_RECOVERIES) {
                return;
            }
            
            console.log('Playback stalled, recovery attempt:', stallRecoveryCount);
            Analytics.playbackStalled({ category: currentCategory, trackName: currentTrackName });
            nowPlayingTitle.textContent = 'קאנעקשאן פראבע...';
            
            // Clear any existing timer
            if (stallTimer) clearTimeout(stallTimer);
            
            // If stalled for more than 8 seconds, try to reload
            stallTimer = setTimeout(() => {
                if (audioPlayer.readyState < 3 && currentPlaylist.length > 0 && !retryPaused) {
                    stallRecoveryCount++;
                    totalRetriesThisSession++;
                    
                    if (totalRetriesThisSession >= MAX_TOTAL_RETRIES) {
                        retryPaused = true;
                        nowPlayingTitle.textContent = 'ביטע ריפרעשט די פעיזש';
                        return;
                    }
                    
                    const currentTime = audioPlayer.currentTime;
                    const track = currentPlaylist[currentIndex];
                    audioPlayer.src = track.url;
                    audioPlayer.currentTime = currentTime;
                    audioPlayer.play().catch(() => {});
                }
            }, 8000);
        };
        
        audioPlayer.onplaying = () => {
            if (currentTrackName) {
                nowPlayingTitle.textContent = currentTrackName;
            }
        };
        
        let noteClearTimeout = null;
        
        // Update playing visual states & spawner functions
        function updatePlayingState() {
            if (isPlaying) {
                playerDiv.classList.add('is-playing');
                playBtn.classList.add('playing');
                if (noteClearTimeout) {
                    clearTimeout(noteClearTimeout);
                    noteClearTimeout = null;
                }
                startNoteSpawner();
            } else {
                playerDiv.classList.remove('is-playing');
                playBtn.classList.remove('playing');
                if (noteClearTimeout) clearTimeout(noteClearTimeout);
                noteClearTimeout = setTimeout(() => {
                    stopNoteSpawner();
                    noteClearTimeout = null;
                }, 1000);
            }
        }

        function startNoteSpawner() {
            const notesContainer = document.getElementById('player-notes');
            if (!notesContainer) return;
            
            notesContainer.innerHTML = ''; // clear first
            
            const symbols = ['♪', '♫', '♩', '♬', '♭', '♮', '♯', '𝄞', '𝄢'];
            const noteCount = 18; // Perfect count for player card
            let html = '';
            
            for (let i = 0; i < noteCount; i++) {
                const symbol = symbols[Math.floor(Math.random() * symbols.length)];
                const size = 18 + Math.random() * 22; // 18px to 40px
                const duration = 25 + Math.random() * 20; // 25s to 45s
                const delay = Math.random() * duration;
                const rot = (Math.random() * 40 - 20) + 'deg';
                
                const angle = Math.random() * 360;
                const distance = 150 + Math.random() * 300; // 150px to 450px spread
                const endXVal = Math.cos(angle * Math.PI / 180) * distance;
                const endYVal = Math.sin(angle * Math.PI / 180) * distance;
                
                const endX = `calc(${endXVal}px - 50%)`;
                const endY = `calc(${endYVal}px - 50%)`;
                
                const wanderClass = `wander-${Math.floor(Math.random() * 3) + 1}`;
                const wanderDuration = 10 + Math.random() * 8;
                
                html += `
                <div class="note-wrapper" style="--end-x: ${endX}; --end-y: ${endY}; animation-duration: ${duration}s; animation-delay: -${delay}s;">
                    <span class="musical-note ${wanderClass}" style="--rot: ${rot}; font-size: ${size}px; animation-duration: ${wanderDuration}s;">${symbol}</span>
                </div>
            `;
            }
            notesContainer.innerHTML = html;
        }

        function stopNoteSpawner() {
            const notesContainer = document.getElementById('player-notes');
            if (notesContainer) {
                notesContainer.innerHTML = '';
            }
        }

        // Update play button when audio state changes
        audioPlayer.onpause = () => {
            isPlaying = false;
            updatePlayingState();
        };
        
        audioPlayer.onplay = () => {
            isPlaying = true;
            updatePlayingState();
            retryCount = 0; // Reset retry counter on successful play
            stallRecoveryCount = 0; // Reset stall counter too
            // Note: we don't reset totalRetriesThisSession or retryPaused
            // Those only reset on page refresh, to prevent abuse
            
            // Start preloading next track when current starts playing
            preloadNextTrack();
        };
        
        // Update progress bar
        audioPlayer.ontimeupdate = () => {
            const progress = (audioPlayer.currentTime / audioPlayer.duration) * 100;
            document.getElementById('progress-fill').style.width = progress + '%';

            document.getElementById('current-time').textContent = formatTime(audioPlayer.currentTime);
            document.getElementById('total-time').textContent = formatTime(audioPlayer.duration);

            // ── Analytics: 25/50/75% listen milestones (once per track) ──
            if (isFinite(progress)) {
                [25, 50, 75].forEach(m => {
                    if (progress >= m && !_milestonesFired[m]) {
                        _milestonesFired[m] = true;
                        Analytics.songMilestone({
                            category: currentCategory,
                            trackName: currentTrackName,
                            milestone: m
                        });
                    }
                });
            }
        };
        
        // Seek function
        function seek(event) {
            if (!audioPlayer.duration || isNaN(audioPlayer.duration)) return;
            
            const progressBar = document.getElementById('progress-bar');
            const rect = progressBar.getBoundingClientRect();
            const percent = Math.max(0, Math.min(1, (event.clientX - rect.left) / rect.width));
            const newTime = percent * audioPlayer.duration;
            
            if (isFinite(newTime)) {
                Analytics.seekAction({
                    category: currentCategory,
                    fromSeconds: audioPlayer.currentTime,
                    toSeconds: newTime,
                    durationSeconds: audioPlayer.duration
                });
                audioPlayer.currentTime = newTime;
            }
        }
        
        // Volume control
        function changeVolume(event) {
            const volumeSlider = document.getElementById('volume-slider');
            const rect = volumeSlider.getBoundingClientRect();
            const percent = (event.clientX - rect.left) / rect.width;
            audioPlayer.volume = Math.max(0, Math.min(1, percent));
            document.getElementById('volume-fill').style.width = (percent * 100) + '%';
            Analytics.volumeChanged({ toVolume: audioPlayer.volume });
        }
        
        // Format time helper
        function formatTime(seconds) {
            if (isNaN(seconds)) return '0:00';
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return mins + ':' + (secs < 10 ? '0' : '') + secs;
        }

        // Keyboard shortcuts
        window.addEventListener('keydown', (e) => {
            // Skip if user is typing in an input field (just in case)
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') {
                return;
            }
            
            if (e.code === 'Space') {
                e.preventDefault(); // Prevent page scrolling
                Analytics.keyboardShortcut('space');
                togglePlay();
            } else if (e.code === 'ArrowRight') {
                e.preventDefault();
                Analytics.keyboardShortcut('arrow_right');
                nextTrack('keyboard');
            } else if (e.code === 'ArrowLeft') {
                e.preventDefault();
                Analytics.keyboardShortcut('arrow_left');
                previousTrack('keyboard');
            }
        });
    </script>
</body>
</html>
